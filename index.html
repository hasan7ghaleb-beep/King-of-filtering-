<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ملك الفلترة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .app-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #007bff; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #statusMsg { margin-top: 15px; color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>👑 ملك الفلترة</h1>
    <p>سجل طلبك الآن وسنتواصل معك فوراً</p>
    <input type="text" id="custName" placeholder="أدخل اسمك الكريم">
    <input type="tel" id="custPhone" placeholder="رقم الجوال">
    <button id="btnSend">إرسال الطلب الآن</button>
    <div id="statusMsg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBLv0cM-wlg2AF7W5v-9kk6nf-dSPnAPEof",
        authDomain: "king-of-filtering-4e2f0.firebaseapp.com",
        databaseURL: "https://king-of-filtering-4e2f0-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "king-of-filtering-4e2f0",
        storageBucket: "king-of-filtering-4e2f0.firebasestorage.app",
        messagingSenderId: "931937657323",
        appId: "1:931937657323:web:83adcca98585ba6fab39ae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById('btnSend').onclick = function() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;

        if(name && phone) {
            push(ref(db, 'orders/'), {
                customerName: name,
                customerPhone: phone,
                time: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('statusMsg').innerText = "✅ تم استلام طلبك يا " + name;
                document.getElementById('custName').value = "";
                document.getElementById('custPhone').value = "";
            });
        } else {
            alert("الرجاء كتابة الاسم والرقم");
        }
    };
</script>

</body>
</html>
