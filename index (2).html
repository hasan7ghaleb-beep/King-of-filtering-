<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملك الفلترة - سحابي</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { color: #0057b8; }
        button { background-color: #0057b8; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-size: 18px; width: 100%; }
        button:hover { background-color: #004494; }
        .status { margin-top: 20px; color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.imgur.com/your-logo-url.png" alt="ملك الفلترة" style="width: 150px;">
    <h1>نظام ملك الفلترة السحابي</h1>
    <p>قم بتعبئة البيانات ثم اضغط حفظ وتصدير</p>
    
    <button onclick="simulateExport()">حفظ وتصدير للسحاب 🚀</button>
    <div id="msg" class="status"></div>
</div>

<script>
    // إعدادات Firebase الخاصة بك (أخذتها من صورك السابقة)
    const firebaseConfig = {
        apiKey: "AIzaSyDeANvGu68LHh2X2h2SsC5rRw92YUvXgyY",
        authDomain: "king-of-filtering.firebaseapp.com",
        projectId: "king-of-filtering",
        storageBucket: "king-of-filtering.appspot.com",
        messagingSenderId: "549508552252",
        appId: "1:549508552252:web:85a357aa0772bfdb13c1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    async function simulateExport() {
        document.getElementById('msg').innerText = "جاري الرفع للسحاب...";
        
        // إنشاء ملف بسيط للتجربة
        const content = "تقرير ملك الفلترة التجريبي";
        const blob = new Blob([content], { type: "text/plain" });
        const fileName = "Report_" + Date.now() + ".txt";

        try {
            // 1. الرفع للمخزن (Storage)
            const fileRef = storage.ref().child('reports/' + fileName);
            await fileRef.put(blob);
            const url = await fileRef.getDownloadURL();

            // 2. الحفظ في قاعدة البيانات (Firestore)
            await db.collection("archive").add({
                name: fileName,
                url: url,
                date: new Date().toLocaleString('ar-SA')
            });

            document.getElementById('msg').innerText = "✅ تم الحفظ في أرشيف ملك الفلترة!";
            alert("تم الحفظ سحابياً بنجاح!");
        } catch (e) {
            console.error(e);
            document.getElementById('msg').innerText = "❌ فشل الرفع!";
        }
    }
</script>
</body>
</html>
