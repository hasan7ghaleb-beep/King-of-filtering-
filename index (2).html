<style>

<script>
// ══════════════════════════════════════════════════
//  إعدادات FIREBASE - ملك الفلترة
// ══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDBaRYgv68LhH2xZN2BsC5eEW92YUJx7gY", 
  authDomain: "king-of-filtering.firebaseapp.com",
  databaseURL: "https://king-of-filtering-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "king-of-filtering",
  storageBucket: "king-of-filtering.appspot.com",
  messagingSenderId: "549508551252",
  appId: "1:549508551252:web:89a13572ea0772bfdb13c1"
};

// تشغيل Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// وظيفة الرفع للسحاب (ستعمل تلقائياً عند الضغط على تحميل)
async function saveToCloud(blob, fileName) {
    try {
        const fileRef = storage.ref().child('reports/' + fileName);
        await fileRef.put(blob);
        const url = await fileRef.getDownloadURL();

        await db.collection("archive").add({
            name: fileName,
            url: url,
            date: new Date().toLocaleString('ar-SA'),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        console.log("تم الحفظ في سحابة ملك الفلترة!");
    } catch (e) {
        console.error("فشل الحفظ السحابي:", e);
    }
}

// تسجيل الـ Service Worker للجوال
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// تعديل وظيفة التحميل الأصلية لترسل للسحاب أيضاً
function exportToExcelWithCloud(blob, filename) {
    // 1. التحميل المعتاد للجهاز
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();

    // 2. الرفع للسحاب (بشكل خفي في الخلفية)
    saveToCloud(blob, filename);
}
</script>
